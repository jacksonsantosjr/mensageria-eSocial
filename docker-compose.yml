services:
  db:
    image: postgres:15-alpine
    container_name: esocial-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-esocial}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-esocial_dev}
      POSTGRES_DB: ${POSTGRES_DB:-esocial_mensageria}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-esocial}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: esocial-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-esocial}:${POSTGRES_PASSWORD:-esocial_dev}@db:5432/${POSTGRES_DB:-esocial_mensageria}
      ENVIRONMENT: ${ENVIRONMENT:-homologacao}
      CERT_PATH: ${CERT_PATH:-/certs}
      CERT_PASSWORD: ${CERT_PASSWORD:-}
      CNPJ_TRANSMISSOR: ${CNPJ_TRANSMISSOR:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - ./backend:/app
      - ${CERT_PATH:-./certs}:/certs:ro
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: esocial-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  pgdata:
    driver: local
